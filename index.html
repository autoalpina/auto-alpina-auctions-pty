<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Alpina Auctions</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="hero">
            <h1>Welcome to Auto Alpina Auctions</h1>
            <p>Your gateway to premium car auctions.</p>
            <a href="#inventory" class="btn">Explore Inventory</a>
        </div>
    </header>
    <main>
        <section id="inventory">
            <h2>Our Inventory</h2>
            <div id="cars-container"></div>
        </section>
        <section id="admin-dashboard">
            <h2>Admin Dashboard</h2>
            <p>Manage your inventory and auctions.</p>
            <button id="load-inventory">Load Inventory</button>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form id="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Auto Alpina Auctions. All rights reserved.</p>
        <p>Contact us via <a href="https://wa.me/yourwhatsapplink">WhatsApp</a></p>
    </footer>
</body>
</html>
