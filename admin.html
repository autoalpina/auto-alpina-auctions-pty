<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="admin-dashboard">
        <h1>Admin Portal</h1>
        <div id="vehicle-form">
            <h2>Add/Edit Vehicle</h2>
            <form id="vehicleForm">
                <input type="text" name="vehicleName" placeholder="Vehicle Name" required />
                <input type="url" name="imageUrl" placeholder="Image URL (HTTPS)" required />
                <button type="submit">Submit</button>
            </form>
        </div>
        <div id="vehicle-list">
            <h2>Vehicle Listings</h2>
            <div class="car-card">
                <img src="placeholder.png" alt="Car Image" onerror="this.onerror=null; this.src='🚗';" />
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </div>
            <div class="confirmation-dialog" id="delete-confirmation">
                <p>Are you sure you want to delete this vehicle?</p>
                <button id="confirm-delete">Yes</button>
                <button id="cancel-delete">No</button>
            </div>
        </div>
        <div class="form-validation">
            <!-- Validation messages will appear here -->
        </div>
        <div class="alerts">
            <!-- Success/Error alerts will appear here -->
        </div>
    </div>
    <script>
        $(document).ready(function() {
            // Add your jQuery functionalities here
            $('#vehicleForm').submit(function(event) {
                event.preventDefault();
                // Validate form and submit
            });
        });
    </script>
</body>
</html>
